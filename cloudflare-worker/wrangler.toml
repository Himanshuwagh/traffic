# Cloudflare Worker — Traffic Tile Server
# ----------------------------------------
# Reads PMTiles from R2 and serves road segments as {z}/{x}/{y}.mvt tiles.
#
# Deploy:  cd cloudflare-worker && npm install && npm run deploy
# Local:   cd cloudflare-worker && npm run dev
#
# After deploying, note the Worker URL shown in the output:
#   https://traffic-tile-server.YOUR_SUBDOMAIN.workers.dev
# Set that as VITE_TILE_SERVER_URL in Vercel environment variables.

name = "traffic-tile-server"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Allows the Worker to use Node.js built-ins that Cloudflare supports
# (needed by the pmtiles package internals).
compatibility_flags = ["nodejs_compat"]

# ── R2 Bucket binding ──────────────────────────────────────────────────────────
# This gives the Worker direct R2 access without HTTP overhead.
# bucket_name MUST match the bucket created by scripts/upload_r2.sh
# (default: "traffic-tiles").

[[r2_buckets]]
binding    = "R2_BUCKET"        # referenced as env.R2_BUCKET in src/index.ts
bucket_name = "traffic-tiles"   # change if you used a different bucket name

# ── Optional: environment variable to override the PMTiles object key ──────────
# Useful if you upload tiles under a different filename.
# [vars]
# PMTILES_KEY = "india-roads.pmtiles"
