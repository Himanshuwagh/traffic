services:
  - type: web
    name: traffic-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: cron
    name: traffic-ingestion-job
    runtime: python
    rootDir: backend
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python fetch_traffic.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
