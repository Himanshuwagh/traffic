name: Hourly TomTom Traffic Ingestion

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run hourly TomTom traffic ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          TOMTOM_TILE_DAILY_LIMIT: "45000"
          TOMTOM_NONTILE_DAILY_LIMIT: "2000"
          TOMTOM_DISCOVERY_ZOOM: "12"
          TOMTOM_HOTSPOT_ZOOM: "13"
          TOMTOM_FLOW_STYLE: "relative-delay"
          TOMTOM_CONGESTION_THRESHOLD: "0.35"
          TOMTOM_PEAK_WINDOWS: "07:00-11:00,17:00-21:00"
          TOMTOM_TRACKING_INTERVAL_HOURS: "3"
          TOMTOM_BASELINE_HOURS: "13,22"
        run: python -m backend.ingest_tomtom_traffic --mode auto
