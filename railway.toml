[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile.fetcher"

[deploy]
# Persistent TomTom ingestion worker.
# Useful env vars:
#   TOMTOM_SCHEDULER_MINUTE=0
#   TOMTOM_SCHEDULER_TIMEZONE=UTC
#   TOMTOM_MAX_CITY_WORKERS=5
startCommand      = "python railway_scheduler.py"
# Long-lived worker — keep the scheduler process running.
restartPolicyType = "ON_FAILURE"
# No healthcheck — this is not an HTTP server.
healthcheckPath   = ""
