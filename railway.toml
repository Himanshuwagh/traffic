[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile.fetcher"

[deploy]
# District-based batch job — covers all of India using OSM admin boundaries.
# Set STATE_FILTER to a comma-separated list of state names to run only those
# states on this deploy, e.g.:
#   STATE_FILTER=Maharashtra,Goa
#   STATE_FILTER=Uttar Pradesh
# Leave STATE_FILTER unset (or empty) to run all 36 states / 766 districts.
startCommand      = "python fetch_india_districts.py"
# One-shot batch job — never restart after the script finishes.
restartPolicyType = "NEVER"
# No healthcheck — this is not an HTTP server.
healthcheckPath   = ""
